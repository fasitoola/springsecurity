# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /


# 数据源配置（当前使用MySQL，可切换为PostgreSQL/Oracle）
spring:

  #jackson进行json转换时使用指定的时区和格式进行转换
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

  # 数据库连接池配置
  datasource:
    # 驱动类名：MySQL8及以上使用 com.mysql.cj.jdbc.Driver，MySQL5版本使用 com.mysql.jdbc.Driver
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接地址
    url: jdbc:mysql://192.168.64.4:3306/springsecurity?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    # 数据库账号
    username: root
    # 数据库密码
    password: 123456
    # HikariCP 连接池参数配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 300000
      connection-timeout: 20000

# MyBatis 相关配置
mybatis:
  # mapper 映射文件路径，读取 resources/mapper/ 下所有 xml 文件
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名扫描包，简化 xml 中实体类全路径写法
  type-aliases-package: com.example.entity
  # 自定义配置
  configuration:
    map-underscore-to-camel-case: true  # 开启下划线转驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开启SQL日志打印